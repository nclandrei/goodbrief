name: Send Newsletter Test

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week ID to test'
        required: true
        default: '2026-W25'
        type: string

permissions:
  contents: read

jobs:
  test-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Check draft validation
        run: npx tsx scripts/assert-draft-ready.ts --week "${{ inputs.week }}" --action "test email delivery"
      - name: Send test email
        run: npm run email:test -- --week "${{ inputs.week }}"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
