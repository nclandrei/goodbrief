name: Generate Newsletter Draft

on:
  schedule:
    - cron: '0 10 * * 6'  # Saturday at 10:00 UTC
  workflow_dispatch:
    inputs:
      week:
        description: 'Week ID (e.g. 2026-W10). Leave empty for current week.'
        required: false
        type: string
      llm_provider:
        description: 'LLM provider for pipeline phases. Default: openrouter. claude-cli is NOT allowed in CI.'
        required: false
        type: choice
        default: openrouter
        options:
          - openrouter
          - gemini

permissions:
  contents: write

jobs:
  determine_week:
    runs-on: ubuntu-latest
    outputs:
      id: ${{ steps.week.outputs.id }}
      llm_provider: ${{ steps.week.outputs.llm_provider }}
    steps:
      - name: Determine week ID and LLM provider
        id: week
        run: |
          if [ -n "${{ inputs.week }}" ]; then
            echo "id=${{ inputs.week }}" >> "$GITHUB_OUTPUT"
          else
            # GitHub cron schedules run in UTC, so derive the ISO week in UTC too.
            echo "id=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
          fi

          # LLM provider: workflow_dispatch input wins; scheduled runs default
          # to openrouter (gemini quota is exhausted on the default project).
          # claude-cli is deliberately not offered here — it runs only in local
          # recovery mode (see recover-week.sh).
          LLM="${{ inputs.llm_provider }}"
          if [ -z "$LLM" ]; then
            LLM="openrouter"
          fi
          echo "llm_provider=$LLM" >> "$GITHUB_OUTPUT"

  prepare:
    runs-on: ubuntu-latest
    needs: determine_week
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Prepare candidates
        run: npm run pipeline:prepare -- --week ${{ needs.determine_week.outputs.id }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-prepare-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}

  score:
    runs-on: ubuntu-latest
    # Worst case: N batches × 15 min/attempt × 5 attempts. With SCORE_BATCH_SIZE=25
    # and ~250 articles this is ~10 batches, but almost every batch succeeds on
    # the first attempt. Set a generous ceiling to absorb pathological cases
    # before the default 6h GH Actions cap.
    timeout-minutes: 350
    needs: [determine_week, prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: pipeline-*-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
          merge-multiple: true
      - name: Score candidates
        run: npm run pipeline:score -- --week ${{ needs.determine_week.outputs.id }} --skip-existing
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'deepseek/deepseek-chat-v3.1:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'
          # Option 3: raise the output cap to 32k so non-reasoning models have
          # headroom for a full SCORE_BATCH_SIZE worth of article-score JSON.
          # Upstream providers silently clamp this to whatever they honor, so
          # erring high is safe. Combined with option 4 (batch-split on
          # truncation in OpenRouterProvider.scoreArticles) this makes the
          # score phase self-healing for unexpectedly long outputs.
          OPENROUTER_MAX_TOKENS: '32000'
          # Post-2026-W15 tuning: bumped from 25 → 50 now that the default
          # model is DeepSeek V3.1 (non-reasoning, ~8k reliable output on
          # free routes) instead of gpt-oss-120b (reasoning, which burned
          # the output budget on <think> traces). At ~200 output tokens per
          # article this puts each batch at ~10k output tokens — still well
          # inside the practical free-tier cap, and the truncation-split
          # recovery path in OpenRouterProvider.scoreArticles catches any
          # provider that silently clamps lower. Halving the request count
          # also stays comfortably inside the OpenRouter free-tier 1000
          # req/day ceiling even with reruns.
          SCORE_BATCH_SIZE: '50'
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-score-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}

  semantic_dedup:
    runs-on: ubuntu-latest
    needs: [determine_week, score]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: pipeline-*-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
          merge-multiple: true
      - name: Semantic dedup
        run: npm run pipeline:semantic-dedup -- --week ${{ needs.determine_week.outputs.id }} --skip-existing
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'deepseek/deepseek-chat-v3.1:free' }}
          # Cheap analytical phase — route to a small fast model to save the
          # DeepSeek V3.1 budget for voice-sensitive phases.
          OPENROUTER_DEDUP_MODEL: ${{ vars.OPENROUTER_DEDUP_MODEL || 'google/gemma-3-27b-it:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-semantic-dedup-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}

  counter_signal_validate:
    runs-on: ubuntu-latest
    needs: [determine_week, semantic_dedup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: pipeline-*-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
          merge-multiple: true
      - name: Counter-signal validation
        run: npm run pipeline:validate -- --week ${{ needs.determine_week.outputs.id }} --skip-existing
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'deepseek/deepseek-chat-v3.1:free' }}
          # Cheap analytical phase — route to a small fast model to save the
          # DeepSeek V3.1 budget for voice-sensitive phases.
          OPENROUTER_COUNTER_SIGNAL_MODEL: ${{ vars.OPENROUTER_COUNTER_SIGNAL_MODEL || 'google/gemma-3-27b-it:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-counter-signal-validate-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}

  select:
    runs-on: ubuntu-latest
    needs: [determine_week, counter_signal_validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: pipeline-*-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
          merge-multiple: true
      - name: Select shortlist
        run: npm run pipeline:select -- --week ${{ needs.determine_week.outputs.id }} --skip-existing
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-select-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}

  wrapper_copy:
    runs-on: ubuntu-latest
    needs: [determine_week, select]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: pipeline-*-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
          merge-multiple: true
      - name: Generate wrapper copy
        run: npm run pipeline:wrapper-copy -- --week ${{ needs.determine_week.outputs.id }} --skip-existing
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'deepseek/deepseek-chat-v3.1:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-wrapper-copy-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}

  refine:
    runs-on: ubuntu-latest
    needs: [determine_week, wrapper_copy]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: pipeline-*-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
          merge-multiple: true
      - name: Refine final draft
        run: npm run pipeline:refine -- --week ${{ needs.determine_week.outputs.id }} --skip-existing
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'deepseek/deepseek-chat-v3.1:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-refine-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}

  commit_outputs:
    runs-on: ubuntu-latest
    needs: [determine_week, refine]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-refine-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
      - name: Materialize final draft
        run: npx tsx scripts/materialize-draft-from-pipeline.ts --week ${{ needs.determine_week.outputs.id }}
      - name: Validate draft freshness
        run: npm run validate-draft-freshness -- --week ${{ needs.determine_week.outputs.id }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      - name: Commit pipeline outputs
        run: |
          git config user.name "Andrei-Mihai Nicolae"
          git config user.email "andrei@nicolaeandrei.com"
          git add data/pipeline/${{ needs.determine_week.outputs.id }} data/drafts/${{ needs.determine_week.outputs.id }}.json
          git diff --staged --quiet || git commit -m "chore: generate draft pipeline for ${{ needs.determine_week.outputs.id }}"
          git pull --rebase
          git push

  proof_email:
    runs-on: ubuntu-latest
    needs: [determine_week, commit_outputs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-refine-${{ needs.determine_week.outputs.id }}
          path: data/pipeline/${{ needs.determine_week.outputs.id }}
      - name: Materialize final draft
        run: npx tsx scripts/materialize-draft-from-pipeline.ts --week ${{ needs.determine_week.outputs.id }}
      - name: Validate draft freshness
        run: npm run validate-draft-freshness -- --week ${{ needs.determine_week.outputs.id }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      - name: Send proof email
        run: npm run notify-draft -- ${{ needs.determine_week.outputs.id }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}

  alert_failure:
    runs-on: ubuntu-latest
    needs:
      - determine_week
      - prepare
      - score
      - semantic_dedup
      - counter_signal_validate
      - select
      - wrapper_copy
      - refine
      - commit_outputs
      - proof_email
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Alert on workflow failure
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        run: |
          npm run alert-workflow-failure -- \
            --workflow "Generate Newsletter Draft" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
