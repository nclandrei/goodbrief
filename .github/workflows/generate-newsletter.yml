name: Generate Newsletter Draft

on:
  schedule:
    - cron: '0 10 * * 6'  # Saturday at 10:00 UTC
  workflow_dispatch:
    inputs:
      week:
        description: 'Week ID (e.g. 2026-W10). Leave empty for current week.'
        required: false
        type: string
      llm_provider:
        description: 'LLM provider for pipeline phases. Default: gemini. claude-cli is NOT allowed in CI.'
        required: false
        type: choice
        default: gemini
        options:
          - gemini
          - openrouter

permissions:
  contents: write

jobs:
  determine_week:
    runs-on: ubuntu-latest
    outputs:
      id: ${{ steps.week.outputs.id }}
      llm_provider: ${{ steps.week.outputs.llm_provider }}
    steps:
      - name: Determine week ID and LLM provider
        id: week
        run: |
          if [ -n "${{ inputs.week }}" ]; then
            echo "id=${{ inputs.week }}" >> "$GITHUB_OUTPUT"
          else
            # GitHub cron schedules run in UTC, so derive the ISO week in UTC too.
            echo "id=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
          fi

          # LLM provider: workflow_dispatch input wins; scheduled runs default
          # to gemini (direct API, reliable free tier). OpenRouter free-tier
          # models are too aggressively rate-limited for CI reliability.
          # claude-cli is deliberately not offered here — it runs only in local
          # recovery mode (see recover-week.sh).
          LLM="${{ inputs.llm_provider }}"
          if [ -z "$LLM" ]; then
            LLM="gemini"
          fi
          echo "llm_provider=$LLM" >> "$GITHUB_OUTPUT"

  generate_draft:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: determine_week
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Run full draft pipeline
        run: npm run pipeline:run-all -- --week ${{ needs.determine_week.outputs.id }} --skip-existing
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          LLM_FALLBACK: openrouter
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemma-4-26b-a4b-it:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'
          OPENROUTER_MAX_TOKENS: '32000'
          SCORE_BATCH_SIZE: '50'
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}

      - name: Materialize final draft
        run: npx tsx scripts/materialize-draft-from-pipeline.ts --week ${{ needs.determine_week.outputs.id }}

      - name: Validate draft quality
        run: npm run validate-draft -- --week ${{ needs.determine_week.outputs.id }}
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          LLM_FALLBACK: openrouter
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemma-4-26b-a4b-it:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'

      - name: Validate draft freshness
        run: npm run validate-draft-freshness -- --week ${{ needs.determine_week.outputs.id }}
        env:
          LLM_PROVIDER: ${{ needs.determine_week.outputs.llm_provider }}
          LLM_FALLBACK: openrouter
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemma-4-26b-a4b-it:free' }}
          OPENROUTER_TIMEOUT_MS: '900000'
          OPENROUTER_MAX_RETRIES: '4'
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}

      - name: Commit pipeline outputs
        run: |
          git config user.name "Andrei-Mihai Nicolae"
          git config user.email "andrei@nicolaeandrei.com"
          git add data/pipeline/${{ needs.determine_week.outputs.id }} data/drafts/${{ needs.determine_week.outputs.id }}.json
          git diff --staged --quiet || git commit -m "chore: generate draft pipeline for ${{ needs.determine_week.outputs.id }}"
          git pull --rebase
          git push

      - name: Send proof email
        run: npm run notify-draft -- --week ${{ needs.determine_week.outputs.id }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}

      - name: Upload pipeline diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-diagnostics-${{ needs.determine_week.outputs.id }}-${{ github.run_attempt }}
          path: |
            data/pipeline/${{ needs.determine_week.outputs.id }}
            data/drafts/${{ needs.determine_week.outputs.id }}.json
          if-no-files-found: warn

  alert_failure:
    runs-on: ubuntu-latest
    needs:
      - determine_week
      - generate_draft
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Alert on workflow failure
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        run: |
          npm run alert-workflow-failure -- \
            --workflow "Generate Newsletter Draft" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
